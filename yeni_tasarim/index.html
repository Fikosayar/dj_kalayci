<!DOCTYPE html>
<html lang="tr" data-dir="a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ_Kalayci</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500;1,6..72,600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><span class="material-symbols-rounded">graphic_eq</span></div>
        <div>
          <div class="brand-name">DJ_Kalayci</div>
          <span class="brand-tag">Müzik Sunucusu</span>
        </div>
      </div>

      <div class="nav-label">Menü</div>
      <ul class="nav-links">
        <li data-target="home" class="active"><span class="material-symbols-rounded">home</span>Ana Sayfa</li>
        <li data-target="upload"><span class="material-symbols-rounded">cloud_upload</span>Müzik Yükle</li>
        <li data-target="player"><span class="material-symbols-rounded">play_circle</span>Oynatıcı</li>
      </ul>

      <div class="sidebar-bottom">
        <div class="nav-label">Sistem</div>
        <ul class="nav-links">
          <li id="btn-output-devices"><span class="material-symbols-rounded">speaker</span>Çıkış Cihazı</li>
          <li data-target="settings"><span class="material-symbols-rounded">settings</span>Ayarlar</li>
        </ul>

        <div id="np-mini" class="np-mini">
          <div class="np-mini-cover art-ph"><span class="material-symbols-rounded">music_note</span></div>
          <div class="np-mini-info">
            <b>—</b>
            <span>Çalıyor</span>
          </div>
          <div class="eq"><i></i><i></i><i></i></div>
        </div>
      </div>
    </aside>

    <!-- ===================== MAIN ===================== -->
    <div class="main">
      <header class="topbar">
        <div id="topbar-title" class="topbar-title">Ana Sayfa</div>
        <div class="topbar-right">
          <span id="demo-badge" class="device-pill" style="display:none; cursor:default; font-family:var(--font-mono); font-size:11px; letter-spacing:.1em;">DEMO MODU</span>
          <button id="device-pill" class="device-pill">
            <span class="material-symbols-rounded">speaker</span>
            <span class="dp-name">Tarayıcı</span>
          </button>
          <div class="dir-switch">
            <button data-dir="a">Gün Batımı</button>
            <button data-dir="b">Gece</button>
          </div>
        </div>
      </header>

      <main id="main-content" class="content"></main>
    </div>
  </div>

  <!-- ===================== SCREENS ===================== -->
  <template id="screen-home">
    <div class="screen fade-in">
      <div class="home">
        <div>
          <div class="home-eyebrow">Kişisel müzik sunucusu</div>
          <h1>Müziğin, <em>kendi sunucunda</em> akar.</h1>
          <p>Parçalarını yükle, kalıcı depolamada güvenle sakla; ister bu cihazdan ister sunucunun donanım hoparlöründen, akıcı bir şekilde dinle.</p>
          <div class="home-cta">
            <button class="btn btn-primary" data-go="player"><span class="material-symbols-rounded">play_arrow</span>Oynatıcıya git</button>
            <button class="btn" data-go="upload"><span class="material-symbols-rounded">cloud_upload</span>Müzik yükle</button>
          </div>
          <div class="home-stats">
            <div style="display:flex; align-items:center; gap:10px;">
              <span class="material-symbols-rounded" style="color:var(--accent)">save</span>
              <span style="font-size:13.5px; color:var(--ink-soft)">Kalıcı depolama</span>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <span class="material-symbols-rounded" style="color:var(--accent)">graphic_eq</span>
              <span style="font-size:13.5px; color:var(--ink-soft)">ALSA donanım çıkışı</span>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <span class="material-symbols-rounded" style="color:var(--accent)">devices</span>
              <span style="font-size:13.5px; color:var(--ink-soft)">Tarayıcı + Sunucu</span>
            </div>
          </div>
        </div>

        <div class="home-visual">
          <div class="home-visual-art art-ph">
            <span class="material-symbols-rounded">album</span>
            <small>kapak görseli</small>
          </div>
          <div class="home-visual-bars" id="home-bars"></div>
        </div>
      </div>
    </div>
  </template>

  <template id="screen-upload">
    <div class="screen fade-in">
      <div class="upload-wrap">
        <div id="drop-zone" class="dropzone">
          <div class="du-icon"><span class="material-symbols-rounded">upload_file</span></div>
          <h3>Dosyaları sürükle ya da seç</h3>
          <p>Yüklediğin parçalar anında kütüphanene eklenir.</p>
          <label for="file-input" class="btn btn-primary">Dosya seç</label>
          <input type="file" id="file-input" accept=".mp3,.wav" multiple style="display:none">
          <div class="hint">Desteklenen: .mp3 · .wav</div>
        </div>

        <div id="upload-progress" class="card progress-card" style="display:none">
          <div class="progress-head">
            <span id="upload-status">Yükleniyor…</span>
            <span id="upload-pct" class="pct">0%</span>
          </div>
          <div class="progress-track"><div id="upload-bar" class="progress-fill"></div></div>
        </div>
      </div>
    </div>
  </template>

  <template id="screen-player">
    <div class="screen fade-in">
      <div class="player">
        <!-- PLAYER -->
        <section class="card player-main">
          <div class="cover">
            <div id="cover-ph" class="art-ph"><span class="material-symbols-rounded">album</span></div>
            <img id="cover-art-img" alt="">
          </div>

          <div class="track-meta">
            <h2 id="track-title">Müzik seçilmedi</h2>
            <span id="track-sub">DJ_Kalayci</span>
          </div>

          <div class="wave-wrap">
            <div id="wave" class="wave"></div>
            <div class="wave-time"><span id="time-current">00:00</span><span id="time-total">00:00</span></div>
          </div>

          <div class="controls">
            <button id="btn-shuffle" class="ctrl" title="Karışık"><span class="material-symbols-rounded">shuffle</span></button>
            <button id="btn-prev" class="ctrl lg"><span class="material-symbols-rounded">skip_previous</span></button>
            <button id="btn-play" class="play-btn"><span id="play-icon" class="material-symbols-rounded">play_arrow</span></button>
            <button id="btn-next" class="ctrl lg"><span class="material-symbols-rounded">skip_next</span></button>
            <button id="btn-loop" class="ctrl" title="Döngü"><span class="material-symbols-rounded">repeat</span></button>
          </div>

          <div class="volume">
            <button id="btn-mute" class="btn-mute"><span id="mute-icon" class="material-symbols-rounded">volume_up</span></button>
            <div id="vbar" class="vbar"><div id="vbar-fill" class="vbar-fill"></div><div id="vbar-handle" class="vbar-handle"></div></div>
          </div>
        </section>

        <!-- PLAYLIST -->
        <section class="card playlist">
          <div class="playlist-head">
            <h3><span class="material-symbols-rounded">queue_music</span>Çalma Listesi</h3>
            <div class="per-page">
              <span>Sayfa:</span>
              <select id="limit-select">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
          </div>
          <div id="music-list" class="tracklist"></div>
          <div class="pager">
            <button id="btn-prev-page" class="btn">Önceki</button>
            <span id="page-indicator" class="pg-ind">1 / 1</span>
            <button id="btn-next-page" class="btn">Sonraki</button>
          </div>
        </section>
      </div>
    </div>
  </template>

  <template id="screen-settings">
    <div class="screen fade-in">
      <div class="settings">
        <div class="card settings-card">
          <h3><span class="material-symbols-rounded">folder_open</span>Yükleme Konumu</h3>
          <p class="desc">Müziklerin kaydedileceği ve okunacağı sunucu klasörünü seçin.</p>

          <div class="path-row">
            <div class="field">
              <input type="text" id="current-path" readonly placeholder="/yükleniyor…">
              <span id="path-ok" class="material-symbols-rounded ok-icon">check_circle</span>
            </div>
            <button id="btn-save-path" class="btn btn-primary">Bu konumu kaydet</button>
          </div>

          <div class="filebox">
            <div class="filebox-head">
              <span>Dosya Yöneticisi</span>
              <button id="btn-up-dir" class="btn" style="padding:6px 12px; font-size:12px"><span class="material-symbols-rounded" style="font-size:16px">arrow_upward</span>Üst klasör</button>
            </div>
            <div id="dir-list" class="dir-list"></div>
          </div>

          <div class="note">
            <div class="note-row">
              <span class="material-symbols-rounded">info</span>
              <p><strong>Coolify Volumes:</strong> Seçtiğiniz konumun, Coolify panelindeki “Storages” sekmesindeki <strong>Destination Path</strong> (örn: /app/uploads) ile birebir aynı olduğundan emin olun. Aksi halde verileriniz korunmaz.</p>
            </div>
            <details>
              <summary><span class="material-symbols-rounded" style="font-size:18px">code</span>Docker Compose örneği</summary>
              <pre>services:
  dj_kalayci_app:
    build: .
    restart: unless-stopped
    ports:
      - '8106:8106'
    devices:
      - '/dev/snd:/dev/snd'
    group_add:
      - audio
    privileged: true
    environment:
      - ALSA_CARD=0
    volumes:
      - 'dj_kalayci_uploads:/app/uploads'
volumes:
  dj_kalayci_uploads: null</pre>
            </details>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ===================== DEVICE MODAL ===================== -->
  <div id="device-modal" class="modal-backdrop">
    <div class="modal fade-in">
      <div class="modal-head">
        <h2><span class="material-symbols-rounded">speaker</span>Çıkış Cihazı</h2>
        <button id="btn-close-modal" class="icon-btn"><span class="material-symbols-rounded">close</span></button>
      </div>
      <div id="device-list" class="device-list"></div>
    </div>
  </div>

  <audio id="audio-player" style="display:none"></audio>

  <script src="js/ScreenManager.js"></script>
  <script src="js/api.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
  <script>
    // home CTA + animasyonlu barlar (ekran şablonu yüklenince)
    window.addEventListener("screenChanged", (e) => {
      if (e.detail.screen === "home") {
        document.querySelectorAll("[data-go]").forEach((b) =>
          b.onclick = () => document.querySelector(`.nav-links li[data-target="${b.dataset.go}"]`).click());
        const bars = document.getElementById("home-bars");
        if (bars) {
          bars.innerHTML = "";
          for (let i = 0; i < 48; i++) {
            const it = document.createElement("i");
            it.style.animationDelay = (i * 0.045).toFixed(2) + "s";
            it.style.height = (15 + Math.abs(Math.sin(i * 0.6)) * 70) + "%";
            bars.appendChild(it);
          }
        }
      }
    });
  </script>
</body>
</html>
