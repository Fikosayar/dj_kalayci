<!DOCTYPE html>
<html lang="tr" data-dir="a">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>DJ_Kalayci</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500;1,6..72,600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="app-container">
    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-name">DJ_Kalayci</div>
          <span class="brand-tag">Müzik Sunucusu</span>
        </div>
      </div>

      <div class="nav-label">Menü</div>
      <ul class="nav-links">
        <li data-target="home" class="active"><span class="material-symbols-rounded">home</span>Ana Sayfa</li>
        <li data-target="upload"><span class="material-symbols-rounded">cloud_upload</span>Müzik Yükle</li>
        <li data-target="player"><span class="material-symbols-rounded">play_circle</span>Oynatıcı</li>
        <li data-target="library"><span class="material-symbols-rounded">library_music</span>Kütüphane</li>
        <li data-target="radio"><span class="material-symbols-rounded">radio</span>Radyo</li>
      </ul>

      <div class="sidebar-bottom">
        <div class="nav-label">Sistem</div>
        <ul class="nav-links">
          <li id="btn-output-devices"><span class="material-symbols-rounded">speaker</span>Çıkış Cihazı</li>
          <li data-target="settings"><span class="material-symbols-rounded">settings</span>Ayarlar</li>
        </ul>

        <div class="sidebar-vol" id="sidebar-vol">
          <button id="sidebar-mute" class="sidebar-vol-btn" title="Sessiz">
            <span id="sidebar-mute-icon" class="material-symbols-rounded">volume_up</span>
          </button>
          <div class="sidebar-vol-track" id="sidebar-vol-track">
            <div class="sidebar-vol-fill" id="sidebar-vol-fill"></div>
            <div class="sidebar-vol-handle" id="sidebar-vol-handle"></div>
          </div>
          <span class="sidebar-vol-pct" id="sidebar-vol-pct">70%</span>
        </div>

        <div id="np-mini" class="np-mini">

          <div class="np-mini-info">
            <b>—</b>
            <span>Çalıyor</span>
          </div>
          <div class="eq"><i></i><i></i><i></i></div>
        </div>
      </div>
    </aside>

    <!-- ===================== MAIN ===================== -->
    <div class="main">
      <header class="topbar">
        <div id="topbar-title" class="topbar-title">Ana Sayfa</div>
        <div class="topbar-right">
          <span id="demo-badge" class="device-pill"
            style="display:none; cursor:default; font-family:var(--font-mono); font-size:11px; letter-spacing:.1em;">DEMO
            MODU</span>
          <button id="btn-party" class="device-pill" style="background:var(--accent); color:#fff; border:none;">
            <span class="material-symbols-rounded">celebration</span>
            <span class="dp-name">Parti</span>
          </button>
          <div class="dir-switch">
            <button data-dir="a">Gün Batımı</button>
            <button data-dir="b">Gece</button>
          </div>
        </div>
      </header>

      <main id="main-content" class="content"></main>
    </div>
  </div>

  <!-- ===================== SCREENS ===================== -->
  <template id="screen-home">
    <div class="screen fade-in">
      <div class="home">
        <div>
          <div class="home-eyebrow">Kişisel müzik sunucusu</div>
          <h1>Müziğin, <em>kendi sunucunda</em> akar.</h1>
          <p>Parçalarını yükle, kalıcı depolamada güvenle sakla; ister bu cihazdan ister sunucunun donanım
            hoparlöründen, akıcı bir şekilde dinle.</p>
          <div class="home-cta">
            <button class="btn btn-primary" data-go="player"><span
                class="material-symbols-rounded">play_arrow</span>Oynatıcıya git</button>
            <button class="btn" data-go="upload"><span class="material-symbols-rounded">cloud_upload</span>Müzik
              yükle</button>
          </div>
          <div class="home-stats">
            <div style="display:flex; align-items:center; gap:10px;">
              <span class="material-symbols-rounded" style="color:var(--accent)">save</span>
              <span style="font-size:13.5px; color:var(--ink-soft)">Kalıcı depolama</span>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <span style="font-size:13.5px; color:var(--ink-soft)">ALSA donanım çıkışı</span>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <span class="material-symbols-rounded" style="color:var(--accent)">devices</span>
              <span style="font-size:13.5px; color:var(--ink-soft)">Tarayıcı + Sunucu</span>
            </div>
          </div>
        </div>

        <div class="home-visual">
          <div class="home-visual-art art-ph">
            <span class="material-symbols-rounded">album</span>
            <small>kapak görseli</small>
          </div>
          <div class="home-visual-bars" id="home-bars"></div>
        </div>
      </div>
    </div>
  </template>

  <template id="screen-upload">
    <div class="screen fade-in">
      <div class="upload-wrap">
        <div id="drop-zone" class="dropzone">
          <div class="du-icon"><span class="material-symbols-rounded">upload_file</span></div>
          <h3>Dosyaları sürükle ya da seç</h3>
          <p>Yüklediğin parçalar anında kütüphanene eklenir.</p>
          <label for="file-input" class="btn btn-primary">Dosya seç</label>
          <input type="file" id="file-input" accept=".mp3,.wav" multiple style="display:none">
          <div class="hint">Desteklenen: .mp3 · .wav</div>
        </div>

        <div id="upload-progress" class="card progress-card" style="display:none">
          <div class="progress-head">
            <span id="upload-status">Yükleniyor…</span>
            <span id="upload-pct" class="pct">0%</span>
          </div>
          <div class="progress-track">
            <div id="upload-bar" class="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <template id="screen-player">
    <div class="screen fade-in">
      <div class="player">
        <!-- PLAYER -->
        <section class="card player-main">
          <div class="cover">
            <div id="cover-ph" class="art-ph"><span class="material-symbols-rounded">album</span></div>
            <img id="cover-art-img" alt="">
          </div>

          <div class="track-meta">
            <h2 id="track-title">Müzik seçilmedi</h2>
            <span id="track-sub">DJ_Kalayci</span>
          </div>

          <div class="wave-wrap">
            <div id="wave" class="wave"></div>
            <div class="wave-time"><span id="time-current">00:00</span><span id="time-total">00:00</span></div>
          </div>

          <div class="controls">
            <button id="btn-shuffle" class="ctrl" title="Karışık"><span
                class="material-symbols-rounded">shuffle</span></button>
            <button id="btn-prev" class="ctrl lg"><span class="material-symbols-rounded">skip_previous</span></button>
            <button id="btn-play" class="play-btn"><span id="play-icon"
                class="material-symbols-rounded">play_arrow</span></button>
            <button id="btn-next" class="ctrl lg"><span class="material-symbols-rounded">skip_next</span></button>
            <button id="btn-loop" class="ctrl" title="Döngü"><span
                class="material-symbols-rounded">repeat</span></button>
          </div>

          <div class="volume">
            <button id="btn-mute" class="btn-mute"><span id="mute-icon"
                class="material-symbols-rounded">volume_up</span></button>
            <div id="vbar" class="vbar">
              <div id="vbar-fill" class="vbar-fill"></div>
              <div id="vbar-handle" class="vbar-handle"></div>
            </div>
          </div>
        </section>

        <!-- PLAYLIST -->
        <section class="card playlist">
          <div class="playlist-head">
            <h3><span class="material-symbols-rounded">queue_music</span>Çalma Listesi</h3>
            <div class="per-page">
              <span>Sayfa:</span>
              <select id="limit-select">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
          </div>
          <div id="music-list" class="tracklist"></div>
          <div class="pager">
            <button id="btn-prev-page" class="btn">Önceki</button>
            <span id="page-indicator" class="pg-ind">1 / 1</span>
            <button id="btn-next-page" class="btn">Sonraki</button>
          </div>
        </section>
      </div>
    </div>
  </template>

  <!-- ===================== SCREEN: LIBRARY ===================== -->
  <template id="screen-library">
    <div class="screen fade-in">
      <div class="library-wrap">

        <div class="library-header">
          <div>
            <h2 class="library-title">Kütüphane</h2>
            <p class="library-sub">Yüklenen müzikleri görüntüle ve yönet</p>
          </div>
          <div class="library-search-wrap">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="lib-search" placeholder="Ara…" autocomplete="off">
          </div>
        </div>

        <div class="library-stats" id="lib-stats">
          <span id="lib-count">— parça</span>
          <span id="lib-size">—</span>
        </div>

        <div id="lib-list" class="lib-list">
          <div class="lib-loading">
            <span class="material-symbols-rounded spin">progress_activity</span>
            Yükleniyor…
          </div>
        </div>

        <div class="lib-pagination">
          <button class="btn" id="lib-prev">&#8592; Önceki</button>
          <span id="lib-page-ind">1 / 1</span>
          <button class="btn" id="lib-next">Sonraki &#8594;</button>
        </div>

      </div>
    </div>
  </template>

  <!-- ===================== SCREEN: RADIO ===================== -->
  <template id="screen-radio">
    <div class="screen fade-in">
      <div class="radio-wrap">

        <!-- Üst kısım: Now Playing -->
        <div class="radio-now-playing" id="radio-np">
          <div class="radio-np-art" id="radio-np-art">
            <span class="material-symbols-rounded">radio</span>
          </div>
          <div class="radio-np-info">
            <div class="radio-np-label">CANLI YAYIN</div>
            <div class="radio-np-name" id="radio-np-name">Radyo seçin veya URL girin</div>
            <div class="radio-np-status" id="radio-np-status">Bekliyor</div>
          </div>
          <div class="radio-np-eq" id="radio-eq" style="display:none">
            <i></i><i></i><i></i><i></i><i></i>
          </div>
        </div>

        <!-- URL girişi -->
        <div class="radio-url-card card">
          <div class="radio-url-row">
            <div class="radio-url-input-wrap">
              <span class="material-symbols-rounded">link</span>
              <input type="url" id="radio-url-input"
                placeholder="Stream URL yapıştırın (http://... .mp3 / .m3u8 / .pls)"
                autocomplete="off" spellcheck="false">
            </div>
            <button class="btn btn-primary" id="radio-play-btn">
              <span class="material-symbols-rounded" id="radio-play-icon">play_arrow</span>
              <span id="radio-play-label">Oynat</span>
            </button>
          </div>
          <p class="radio-url-hint">MP3 stream, AAC, HLS (.m3u8) ve PLS/M3U playlist URL’leri desteklenir.</p>
        </div>

        <!-- Kayıtlı İstasyonlarım -->
        <div class="radio-saved-section" id="radio-saved-section">
          <div class="radio-saved-header">
            <div class="radio-saved-title">
              <span class="material-symbols-rounded">bookmarks</span>
              Kayıtlı İstasyonlarım
            </div>
            <button class="btn-add-station" id="btn-add-station" title="Yeni istasyon ekle">
              <span class="material-symbols-rounded">add</span>
            </button>
          </div>

          <!-- Ekleme formu (başta gizli) -->
          <div class="station-add-form" id="station-add-form" style="display:none">
            <div class="station-form-row">
              <div class="station-form-field">
                <span class="material-symbols-rounded">label</span>
                <input type="text" id="station-name-input" placeholder="İstasyon adı (örn: Fenomen Dans)" maxlength="40">
              </div>
              <div class="station-form-field">
                <span class="material-symbols-rounded">link</span>
                <input type="url" id="station-url-input" placeholder="Stream URL (http://... .mp3 / .m3u8)">
              </div>
              <div class="station-form-actions">
                <button class="btn-station-save" id="btn-station-save">
                  <span class="material-symbols-rounded">save</span> Kaydet
                </button>
                <button class="btn-station-cancel" id="btn-station-cancel">
                  <span class="material-symbols-rounded">close</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Kayıtlı istasyonlar listesi -->
          <div class="saved-stations-list" id="saved-stations-list">
            <!-- JS tarafından doldurulur -->
          </div>
          <div class="saved-stations-empty" id="saved-stations-empty" style="display:none">
            <span class="material-symbols-rounded">bookmark_add</span>
            <span>Henüz kayıtlı istasyon yok.<br>URL girerek + butonuyla ekleyin.</span>
          </div>
        </div>

        <!-- Hazır radyolar -->
        <div class="radio-presets-title">Hazır Radyolar</div>
        <div class="radio-presets" id="radio-presets">

          <button class="radio-preset-card" data-url="https://www.radyodinle.info/radyo-dinle/trt-radyo-1.mp3" data-name="TRT Radyo 1">
            <div class="rpc-icon" style="background:linear-gradient(135deg,#1a237e,#283593)"><span class="material-symbols-rounded">radio</span></div>
            <div class="rpc-name">TRT Radyo 1</div>
            <div class="rpc-tag">Kültür &amp; Müzik</div>
          </button>

          <button class="radio-preset-card" data-url="https://trtradyo3.live.trt.com.tr/master.m3u8" data-name="TRT FM">
            <div class="rpc-icon" style="background:linear-gradient(135deg,#880e4f,#ad1457)"><span class="material-symbols-rounded">radio</span></div>
            <div class="rpc-name">TRT FM</div>
            <div class="rpc-tag">Pop &amp; Rock</div>
          </button>

          <button class="radio-preset-card" data-url="https://kralpop.radyotvonline.com/kralpop" data-name="Kral Pop">
            <div class="rpc-icon" style="background:linear-gradient(135deg,#4a148c,#6a1b9a)"><span class="material-symbols-rounded">radio</span></div>
            <div class="rpc-name">Kral Pop</div>
            <div class="rpc-tag">Türk Pop</div>
          </button>

          <button class="radio-preset-card" data-url="https://kralmuzik.radyotvonline.net/kralmuzik" data-name="Kral Müzik">
            <div class="rpc-icon" style="background:linear-gradient(135deg,#1b5e20,#2e7d32)"><span class="material-symbols-rounded">radio</span></div>
            <div class="rpc-name">Kral Müzik</div>
            <div class="rpc-tag">Türkçe Hit</div>
          </button>

          <button class="radio-preset-card" data-url="https://powerturk.radyotvonline.net/powerturk" data-name="Power Türk">
            <div class="rpc-icon" style="background:linear-gradient(135deg,#b71c1c,#c62828)"><span class="material-symbols-rounded">radio</span></div>
            <div class="rpc-name">Power Türk</div>
            <div class="rpc-tag">En Çok Dinlenen</div>
          </button>

          <button class="radio-preset-card" data-url="https://radyoviva.radyotvonline.net/radyoviva" data-name="Radyo Viva">
            <div class="rpc-icon" style="background:linear-gradient(135deg,#e65100,#ef6c00)"><span class="material-symbols-rounded">radio</span></div>
            <div class="rpc-name">Radyo Viva</div>
            <div class="rpc-tag">Pop</div>
          </button>

          <button class="radio-preset-card" data-url="https://jazz24.org/stream" data-name="Jazz 24">
            <div class="rpc-icon" style="background:linear-gradient(135deg,#263238,#37474f)"><span class="material-symbols-rounded">piano</span></div>
            <div class="rpc-name">Jazz 24</div>
            <div class="rpc-tag">Jazz</div>
          </button>

          <button class="radio-preset-card" data-url="https://streams.ilovemusic.de/iloveradio17.mp3" data-name="Deep House Radio">
            <div class="rpc-icon" style="background:linear-gradient(135deg,#006064,#00838f)"><span class="material-symbols-rounded">waves</span></div>
            <div class="rpc-name">Deep House Radio</div>
            <div class="rpc-tag">House &amp; Electronic</div>
          </button>

        </div>

      </div>
    </div>
  </template>

  <!-- ===================== SCREEN: SETTINGS ===================== -->
  <template id="screen-settings">
    <div class="screen fade-in">
      <div class="settings">
        <div class="card settings-card">
          <h3><span class="material-symbols-rounded">folder_open</span>Yükleme Konumu</h3>
          <p class="desc">Müziklerin kaydedileceği ve okunacağı sunucu klasörünü seçin.</p>

          <div class="path-row">
            <div class="field">
              <input type="text" id="current-path" readonly placeholder="/yükleniyor…">
              <span id="path-ok" class="material-symbols-rounded ok-icon">check_circle</span>
            </div>
            <button id="btn-save-path" class="btn btn-primary">Bu konumu kaydet</button>
          </div>

          <div class="filebox">
            <div class="filebox-head">
              <span>Dosya Yöneticisi</span>
              <button id="btn-up-dir" class="btn" style="padding:6px 12px; font-size:12px"><span
                  class="material-symbols-rounded" style="font-size:16px">arrow_upward</span>Üst klasör</button>
            </div>
            <div id="dir-list" class="dir-list"></div>
          </div>

          <div class="note">
            <div class="note-row">
              <span class="material-symbols-rounded">info</span>
              <p><strong>Coolify Volumes:</strong> Seçtiğiniz konumun, Coolify panelindeki “Storages” sekmesindeki
                <strong>Destination Path</strong> (örn: /app/uploads) ile birebir aynı olduğundan emin olun. Aksi halde
                verileriniz korunmaz.
              </p>
            </div>
            <details>
              <summary><span class="material-symbols-rounded" style="font-size:18px">code</span>Docker Compose örneği
              </summary>
              <pre>services:
  dj_kalayci_app:
    build: .
    restart: unless-stopped
    ports:
      - '8106:8106'
    devices:
      - '/dev/snd:/dev/snd'
    group_add:
      - audio
    privileged: true
    environment:
      - ALSA_CARD=0
    volumes:
      - 'dj_kalayci_uploads:/app/uploads'
volumes:
  dj_kalayci_uploads: null</pre>
            </details>
          </div>
        </div>
      </div>
    </div>
  </template>

  <template id="screen-party">
    <div class="screen fade-in"
      style="position:fixed; top:0; left:0; right:0; bottom:0; z-index:9999; background:transparent; display:flex; align-items:flex-end; justify-content:flex-start; padding: 40px; box-sizing:border-box; max-width:100%; margin:0; overflow:hidden;">

      <!-- Video Arkaplan -->
      <video src="/img/parti.mp4?v=1" autoplay loop muted playsinline
        style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1; pointer-events:none;"></video>

      <!-- Kapatma Tuşu -->
      <button onclick="document.querySelector('.nav-links li[data-target=\'home\']').click()" style="position:absolute; top:30px; right:40px; background:rgba(255,255,255,0.1); border:none; color:var(--ink-soft); cursor:pointer; padding:10px; border-radius:50%; transition:all 0.2s;" onmouseover="this.style.color='#fff'; this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.color='var(--ink-soft)'; this.style.background='rgba(255,255,255,0.1)'"><span class="material-symbols-rounded" style="font-size:36px;">close</span></button>

      <!-- Player (Kapaksız) -->
      <div class="card player-main"
        style="width: 500px; padding: 25px; margin: 0; display:block; background: #ffffffb0; box-shadow: none; position: relative;">

        <!-- Gizli Kuklalar (Player.js çökmesin diye) -->
        <div style="display:none">
          <img id="cover-art-img">
          <div id="cover-ph"></div>
          <div id="music-list"></div>
          <select id="limit-select"></select>
          <button id="btn-prev-page"></button>
          <button id="btn-next-page"></button>
          <span id="page-indicator"></span>
        </div>

        <div class="track-meta" style="text-align:left; padding:0; margin-bottom: 20px;">
          <h2 id="track-title" style="font-size: 20px; font-weight:600; margin-bottom: 6px;">Müzik seçilmedi</h2>
          <span id="track-sub" style="font-size: 13px; color:var(--ink-soft);">DJ_Kalayci</span>
        </div>

        <div class="wave-wrap" style="margin-bottom: 25px;">
          <div id="wave" class="wave"></div>
          <div class="wave-time"><span id="time-current">00:00</span><span id="time-total">00:00</span></div>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between;">
          <div class="controls"
            style="margin:0; background:transparent; border:none; padding:0; justify-content:flex-start; gap:12px;">
            <button id="btn-shuffle" class="ctrl" title="Karışık"><span
                class="material-symbols-rounded">shuffle</span></button>
            <button id="btn-prev" class="ctrl"><span class="material-symbols-rounded">skip_previous</span></button>
            <button id="btn-play" class="play-btn" style="width:46px; height:46px;"><span id="play-icon"
                class="material-symbols-rounded">play_arrow</span></button>
            <button id="btn-next" class="ctrl"><span class="material-symbols-rounded">skip_next</span></button>
            <button id="btn-loop" class="ctrl" title="Döngü"><span
                class="material-symbols-rounded">repeat</span></button>
          </div>

          <div class="volume" style="margin-left: 20px;">
            <button id="btn-mute" class="btn-mute"><span id="mute-icon"
                class="material-symbols-rounded">volume_up</span></button>
            <div id="vbar" class="vbar">
              <div id="vbar-fill" class="vbar-fill"></div>
              <div id="vbar-handle" class="vbar-handle"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ===================== DEVICE MODAL ===================== -->
  <div id="device-modal" class="modal-backdrop">
    <div class="modal fade-in">
      <div class="modal-head">
        <h2><span class="material-symbols-rounded">speaker</span>Çıkış Cihazı</h2>
        <button id="btn-close-modal" class="icon-btn"><span class="material-symbols-rounded">close</span></button>
      </div>
      <div id="device-list" class="device-list"></div>
    </div>
  </div>

  <audio id="audio-player" style="display:none"></audio>
  <script>
    // Sayfa yüklenir yüklenmez audio elementine kaydedilmiş ses seviyesini uygula
    // player.js'den önce çalışır — tam sessizliği garantiler
    (function() {
      const audio = document.getElementById('audio-player');
      if (!audio) return;
      try {
        const saved = JSON.parse(localStorage.getItem('djk_player_v1') || '{}');
        const vol = (saved.volume !== undefined && saved.volume !== null) ? saved.volume : 0.7;
        audio.volume = saved.muted ? 0 : vol;
      } catch(e) {
        audio.volume = 0.7;
      }
      // Her yeni kaynak yüklendiğinde de uygula
      audio.addEventListener('loadstart', function() {
        try {
          const saved = JSON.parse(localStorage.getItem('djk_player_v1') || '{}');
          const vol = (saved.volume !== undefined) ? saved.volume : 0.7;
          audio.volume = saved.muted ? 0 : vol;
        } catch(e) {}
      });
      audio.addEventListener('volumechange', function() {
        // Tarayıcı volume'u değiştirirse state ile karşılaştır ve düzelt
        // (Bu event player.js applyVolume'dan geliyorsa dokunma)
        audio._lastSetVolume = audio.volume;
      });
    })();
  </script>

  <script src="js/ScreenManager.js"></script>
  <script src="js/api.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
  <script>
    // home CTA + animasyonlu barlar (ekran şablonu yüklenince)
    window.addEventListener("screenChanged", (e) => {
      if (e.detail.screen === "home") {
        document.querySelectorAll("[data-go]").forEach((b) =>
          b.onclick = () => document.querySelector(`.nav-links li[data-target="${b.dataset.go}"]`).click());
        const bars = document.getElementById("home-bars");
        if (bars) {
          bars.innerHTML = "";
          for (let i = 0; i < 48; i++) {
            const it = document.createElement("i");
            it.style.animationDelay = (i * 0.045).toFixed(2) + "s";
            it.style.height = (15 + Math.abs(Math.sin(i * 0.6)) * 70) + "%";
            bars.appendChild(it);
          }
        }
      }
    });
  </script>
