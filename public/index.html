<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ_Kalayci</title>
    <link rel="stylesheet" href="css/style.css?v=1.2">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    
    <div class="app-container">
        <!-- APP SHELL / SIDEBAR -->
        <div class="sidebar glass-effect">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 32px;">
                <div style="width: 40px; height: 40px; background: var(--accent-color); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <span class="material-symbols-rounded" style="color: white;">headphones</span>
                </div>
                <!-- testing update -->
                <h2 style="margin: 0; font-size: 20px;">DJ_Kalayci</h2>
            </div>
            
            <ul class="nav-links">
                <li data-target="home" class="active">
                    <span class="material-symbols-rounded">home</span>
                    Ana Sayfa
                </li>
                <li data-target="upload">
                    <span class="material-symbols-rounded">cloud_upload</span>
                    Müzik Yükle
                </li>
                <li data-target="player">
                    <span class="material-symbols-rounded">play_circle</span>
                    Oynatıcı
                </li>
            </ul>

            <div class="sidebar-bottom">
                <ul class="nav-links">
                    <li id="btn-output-devices">
                        <span class="material-symbols-rounded">speaker</span>
                        Çıkış Cihazı
                    </li>
                    <li data-target="settings">
                        <span class="material-symbols-rounded">settings</span>
                        Ayarlar
                    </li>
                </ul>
            </div>
        </div>

        <!-- MAIN CONTENT AREA -->
        <div id="main-content" class="main-content">
            <!-- Ekranlar buralara şablonlardan yüklenecek -->
        </div>
    </div>

    <!-- SCREENS (Templates) -->
    
    <template id="screen-home">
        <div class="screen fade-in" style="display: flex; align-items: center; justify-content: center; height: 100%;">
            <div class="glass-effect" style="display: flex; align-items: center; gap: 64px; padding: 64px; border-radius: 40px; max-width: 1250px; width: 100%; margin: 0 auto;">
                <!-- Sol: Görsel -->
                <div style="flex: 0 0 500px; height: 500px; border-radius: 32px; overflow: hidden; box-shadow: 0 32px 64px rgba(0,0,0,0.6); border: 1px solid var(--glass-border); position: relative;">
                    <div style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), transparent); z-index: 1;"></div>
                    <img src="img/djkalayci_logo.jpg" alt="DJ Kalayci" style="width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 0;">
                </div>
                
                <!-- Sağ: Metin -->
                <div style="flex: 1;">
                    <h1 style="font-size: 56px; margin-bottom: 24px; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; line-height: 1.15; letter-spacing: -1px;">DJ_Kalayci'ya Hoş Geldiniz</h1>
                    <p style="color: var(--text-secondary); font-size: 20px; line-height: 1.7; margin-bottom: 48px;">
                        Müziklerinizi güvenle sunucuya yükleyin, gelişmiş kalıcı depolama sistemiyle yönetin ve ALSA donanım gücünü kullanarak akıcı bir şekilde dinleyin.
                    </p>
                    <div>
                        <button class="btn btn-primary" onclick="document.querySelector('li[data-target=\'player\']').click()" style="display: inline-flex; align-items: center; gap: 16px; padding: 20px 40px; font-size: 20px; font-weight: 600; border-radius: 20px;">
                            Müziğe git <span class="material-symbols-rounded" style="font-size: 28px;">arrow_forward</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="screen-settings">
        <div class="screen fade-in">
            <h1 style="margin-bottom: 32px; font-size: 28px;">Ayarlar</h1>
            
            <div class="glass-effect" style="padding: 32px; border-radius: 24px; margin-bottom: 24px;">
                <h3 style="margin-top: 0; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;">
                    <span class="material-symbols-rounded" style="color: var(--accent-color);">folder_open</span>
                    Yükleme Konumu (Upload Path)
                </h3>
                <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 24px;">Müziklerin kaydedileceği ve okunacağı sunucu klasörünü seçin.</p>
                
                <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                    <div style="flex: 1; position: relative;">
                        <input type="text" id="current-path-input" readonly placeholder="/Yükleniyor..." style="width: 100%; font-family: monospace; font-size: 14px; padding-right: 40px;">
                        <span id="path-success-icon" class="material-symbols-rounded" style="position: absolute; right: 12px; top: 12px; color: var(--success); opacity: 0; transition: 0.3s;">check_circle</span>
                    </div>
                    <button id="save-location-btn" class="btn btn-primary">Bu Konumu Seç ve Kaydet</button>
                </div>

                <div style="background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--glass-border); overflow: hidden;">
                    <div style="padding: 12px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02);">
                        <span style="font-size: 13px; color: var(--text-secondary); font-weight: 500;">Dosya Yöneticisi</span>
                        <button id="btn-up-dir" class="btn" style="padding: 6px 12px; font-size: 12px; display: flex; align-items: center; gap: 4px;">
                            <span class="material-symbols-rounded" style="font-size: 16px;">arrow_upward</span> Bir Üst Klasöre Git
                        </button>
                    </div>
                    <div id="dir-list" style="max-height: 300px; overflow-y: auto; padding: 8px;">
                        <!-- Klasörler buraya JS ile eklenecek -->
                    </div>
                </div>
                
                <div style="margin-top: 20px; padding: 16px; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 12px; display: flex; flex-direction: column; gap: 12px;">
                    <div style="display: flex; gap: 12px; align-items: flex-start;">
                        <span class="material-symbols-rounded" style="color: #f59e0b;">warning</span>
                        <p style="margin: 0; font-size: 14px; color: #fcd34d; line-height: 1.5; flex: 1;">
                            <strong>Önemli Not (Coolify Volumes):</strong> Seçtiğiniz bu konumun, Coolify panelindeki "Storages" (Kalıcı Depolama) sekmesinde yer alan <strong>Destination Path</strong> (örn: /app/uploads) ile birebir aynı olduğuna emin olun. Aksi takdirde verileriniz korunmaz.
                        </p>
                    </div>
                    <details style="margin-top: 8px; border: 1px solid rgba(245, 158, 11, 0.2); border-radius: 8px; overflow: hidden; outline: none;">
                        <summary style="cursor: pointer; padding: 10px 16px; font-size: 14px; color: #fcd34d; font-weight: 600; display: flex; align-items: center; background: rgba(245, 158, 11, 0.1); user-select: none;">
                            <span class="material-symbols-rounded" style="font-size: 20px; margin-right: 8px;">code</span> Docker Compose Örneği
                        </summary>
                        <div style="padding: 16px; background: rgba(0, 0, 0, 0.5); border-top: 1px solid rgba(245, 158, 11, 0.2);">
                            <pre style="margin: 0; color: #e2e8f0; font-size: 13px; font-family: monospace; white-space: pre-wrap; user-select: all;">version: '3.8'
services:
  dj_kalayci_app:
    build: .
    restart: unless-stopped
    ports:
      - '8106:8106'
    devices:
      - '/dev/snd:/dev/snd'
    group_add:
      - audio
    privileged: true
    ipc: host
    volumes:
      - 'dj_kalayci_uploads:/app/uploads'
volumes:
  dj_kalayci_uploads: null</pre>
                        </div>
                    </details>
                </div>
            </div>
        </div>
    </template>

    <template id="screen-upload">
        <div class="screen fade-in">
            <h1 style="margin-bottom: 32px; font-size: 28px;">Müzik Yükle</h1>
            <div id="drop-zone" class="glass-effect" style="border: 2px dashed var(--glass-border); padding: 64px 32px; text-align: center; border-radius: 24px; transition: all 0.3s ease; cursor: pointer;">
                <span class="material-symbols-rounded" style="font-size: 64px; color: var(--accent-color); margin-bottom: 16px;">cloud_upload</span>
                <h3 style="margin-bottom: 8px;">Dosyaları Sürükle veya Seç</h3>
                <p style="color: var(--text-secondary); margin-bottom: 24px; font-size: 14px;">Desteklenen formatlar: .mp3</p>
                <label for="file-input" class="btn btn-primary" style="cursor: pointer; display: inline-block;">Dosya Seç</label>
                <input type="file" id="file-input" accept=".mp3" multiple style="display: none;">
            </div>

            <div id="upload-progress-container" class="glass-effect" style="display: none; margin-top: 24px; padding: 24px; border-radius: 16px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                    <span id="upload-status-text" style="font-weight: 500;">Yükleniyor...</span>
                    <span id="upload-percent" style="color: var(--accent-color); font-weight: 600;">0%</span>
                </div>
                <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                    <div id="upload-progress-bar" style="width: 0%; height: 100%; background: var(--accent-color); border-radius: 4px; transition: width 0.3s ease, background 0.3s ease;"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="screen-player">
        <div class="screen fade-in" style="display: flex; gap: 32px; height: calc(100vh - 80px);">
            
            <!-- SOL TARAF: OYNATICI (PLAYER CARD) -->
            <div class="glass-effect" style="flex: 0 0 calc(50% - 16px); width: calc(50% - 16px); border-radius: 32px; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden;">
                <!-- Arka plan bulanıklığı için süsleme -->
                <div style="position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: var(--accent-color); filter: blur(100px); opacity: 0.3; border-radius: 50%;"></div>
                
                <!-- Kapak Fotoğrafı -->
                <div style="width: 240px; height: 240px; border-radius: 24px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); box-shadow: 0 16px 32px rgba(0,0,0,0.3); margin-bottom: 32px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                    <span id="default-cover-icon" class="material-symbols-rounded" style="font-size: 80px; color: rgba(255,255,255,0.1); position: absolute;">album</span>
                    <img id="cover-art-img" src="" style="width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s ease; position: relative; z-index: 1;">
                </div>

                <h2 id="current-track-name" style="margin: 0 0 8px 0; font-size: 24px; text-align: center; max-width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Müzik Seçilmedi</h2>
                <p style="color: var(--text-secondary); margin: 0 0 32px 0; font-size: 14px;">DJ_Kalayci</p>

                <!-- Özel İlerleme Çubuğu -->
                <div style="width: 100%; max-width: 400px; margin-bottom: 24px;">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
                        <span id="time-current">00:00</span>
                        <span id="time-total">00:00</span>
                    </div>
                    <div class="progress-container" id="progress-bar-bg" style="width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; position: relative;">
                        <div id="progress-bar-fill" style="width: 0%; height: 100%; background: var(--accent-color); border-radius: 4px; pointer-events: none;"></div>
                        <div id="progress-bar-handle" class="progress-handle" style="left: 0%;"></div>
                    </div>
                </div>

                <!-- Kontroller -->
                <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 16px;">
                    <button id="btn-shuffle" class="control-btn" title="Karışık Çal"><span class="material-symbols-rounded">shuffle</span></button>
                    <button id="btn-prev" class="control-btn"><span class="material-symbols-rounded" style="font-size: 36px;">skip_previous</span></button>
                    
                    <button id="btn-play-pause" class="play-btn" style="width: 64px; height: 64px; border-radius: 32px; background: var(--accent-color); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4); transition: all 0.2s ease;">
                        <span id="play-pause-icon" class="material-symbols-rounded" style="font-size: 36px;">play_arrow</span>
                    </button>
                    
                    <button id="btn-next" class="control-btn"><span class="material-symbols-rounded" style="font-size: 36px;">skip_next</span></button>
                    <button id="btn-loop" class="control-btn" title="Döngü"><span class="material-symbols-rounded">repeat</span></button>
                </div>
                
                <!-- VOLUME CONTROL -->
                <div class="volume-container" style="display: flex; align-items: center; gap: 12px; width: 100%; max-width: 400px; margin-top: 8px; padding: 0 16px;">
                    <button id="btn-mute" class="control-btn" style="color: var(--text-secondary); padding: 0; min-width: 24px;"><span class="material-symbols-rounded" id="mute-icon">volume_up</span></button>
                    <div id="volume-bar-bg" class="progress-container" style="flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; position: relative;">
                        <div id="volume-bar-fill" style="width: 100%; height: 100%; background: var(--accent-color); border-radius: 4px; pointer-events: none; transition: width 0.1s linear;"></div>
                        <div id="volume-bar-handle" class="progress-handle" style="left: 100%;"></div>
                    </div>
                </div>
                
                <!-- Gizli Orijinal Audio -->
                <audio id="audio-player" style="display: none;"></audio>
            </div>

            <!-- SAĞ TARAF: PLAYLIST -->
            <div class="glass-effect" style="flex: 0 0 calc(50% - 16px); width: calc(50% - 16px); border-radius: 32px; padding: 32px; display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h3 style="margin: 0; display: flex; align-items: center; gap: 8px;">
                        <span class="material-symbols-rounded" style="color: var(--accent-color);">queue_music</span>
                        Çalma Listesi
                    </h3>
                    
                    <div style="display: flex; align-items: center; gap: 12px; font-size: 13px;">
                        <span style="color: var(--text-secondary);">Sayfa Başı:</span>
                        <select id="player-limit-select" class="glass-effect" style="padding: 4px 8px; border-radius: 6px; color: white; border: 1px solid var(--glass-border); outline: none;">
                            <option value="10">10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                </div>

                <div id="music-list" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 8px;">
                    <!-- Müzikler buraya JS ile dolacak -->
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--glass-border);">
                    <button id="btn-prev-page" class="btn" style="padding: 8px 16px;">Önceki</button>
                    <span id="page-indicator" style="font-size: 14px; color: var(--text-secondary);">Sayfa: 1 / 1</span>
                    <button id="btn-next-page" class="btn" style="padding: 8px 16px;">Sonraki</button>
                </div>
            </div>

        </div>
    </template>

    <script src="js/ScreenManager.js?v=1.1"></script>
    <script src="js/main.js?v=1.1"></script>

    <!-- Cihaz Seçim Modalı -->
    <div id="device-modal" class="modal-backdrop" style="display: none;">
        <div class="modal-content glass-effect fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="margin: 0; display: flex; align-items: center; gap: 8px;">
                    <span class="material-symbols-rounded" style="color: var(--accent-color);">speaker</span>
                    Çıkış Cihazı Seç
                </h2>
                <button id="btn-close-modal" class="control-btn"><span class="material-symbols-rounded">close</span></button>
            </div>
            
            <div id="device-list" style="display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 8px;">
                <!-- Cihazlar dinamik gelecek -->
            </div>
        </div>
    </div>
</body>
</html>
