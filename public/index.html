<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ_Kalayci</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar (Sol Menü) -->
        <nav class="sidebar">
            <div class="logo">
                <span class="material-symbols-rounded">rocket_launch</span>
                <h2>DJ_Kalayci</h2>
            </div>
            
            <ul class="nav-links">
                <li data-target="home" class="active">
                    <span class="material-symbols-rounded">home</span>
                    Ana Sayfa
                </li>
                <li data-target="upload">
                    <span class="material-symbols-rounded">upload_file</span>
                    Dosya Yükle
                </li>
                <li data-target="player">
                    <span class="material-symbols-rounded">play_circle</span>
                    Müzik Çalar
                </li>
                <li data-target="analytics">
                    <span class="material-symbols-rounded">bar_chart</span>
                    İstatistikler
                </li>
            </ul>

            <div class="sidebar-bottom">
                <ul class="nav-links">
                    <li id="btn-output-devices">
                        <span class="material-symbols-rounded">speaker</span>
                        Çıkış Cihazı
                    </li>
                    <li data-target="settings">
                        <span class="material-symbols-rounded">settings</span>
                        Ayarlar
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Ana İçerik Alanı (Sağ Taraf) -->
        <main class="main-content">
            <div id="screen-container">
                <!-- İçerikler ScreenManager tarafından buraya enjekte edilecek -->
            </div>
        </main>
    </div>

    <!-- Şablonlar -->
    <template id="screen-home">
        <div class="screen fade-in">
            <div class="header">
                <h1>Ana Sayfa</h1>
                <p>Sisteme hoş geldiniz. İstatistiklere hızlı bir bakış.</p>
            </div>
            <div class="cards-grid">
                <div class="card glass-effect">
                    <h3>Aktif Görevler</h3>
                    <h2>12</h2>
                </div>
                <div class="card glass-effect">
                    <h3>Sunucu Durumu</h3>
                    <h2 class="text-success">Sağlıklı</h2>
                </div>
                <div class="card glass-effect">
                    <h3>Disk Kullanımı</h3>
                    <h2>%45</h2>
                </div>
            </div>
        </div>
    </template>

    <template id="screen-upload">
        <div class="screen fade-in">
            <div class="header">
                <h1>Dosya Yükle</h1>
                <p>Müzik dosyalarınızı (.mp3) buraya sürükleyip bırakabilirsiniz.</p>
            </div>
            <div class="upload-area glass-effect" id="drop-zone">
                <span class="material-symbols-rounded upload-icon">cloud_upload</span>
                <h3>Dosyaları sürükleyip bırakın</h3>
                <p>veya seçmek için tıklayın</p>
                <input type="file" id="file-input" multiple accept=".mp3,audio/*" style="display: none;">
                <button class="btn-primary" onclick="document.getElementById('file-input').click()">Dosya Seç</button>
            </div>
            <!-- Upload İlerleme Çubuğu -->
            <div id="upload-progress-container" style="display: none; margin-top: 24px;" class="glass-effect">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span id="upload-status-text">Yükleniyor...</span>
                    <span id="upload-percent">0%</span>
                </div>
                <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                    <div id="upload-progress-bar" style="width: 0%; height: 100%; background: var(--accent-color); transition: width 0.2s;"></div>
                </div>
            </div>
        </div>
    </template>
    
    <template id="screen-player">
        <div class="screen fade-in" style="display: flex; flex-direction: row; gap: 32px; height: calc(100vh - 80px);">
            
            <!-- Sol Taraf: Özel Oynatıcı Kartı (Custom Player) -->
            <div class="player-card glass-effect" style="width: 380px; display: flex; flex-direction: column; gap: 32px; align-items: center; position: sticky; top: 0; padding: 32px 24px; align-self: flex-start;">
                
                <!-- Kapak Fotoğrafı -->
                <div class="cover-art-container" style="width: 280px; height: 280px; border-radius: 24px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,0.4); background: rgba(255,255,255,0.05); position: relative; flex-shrink: 0;">
                    <span id="default-cover-icon" class="material-symbols-rounded" style="font-size: 100px; color: var(--text-secondary); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">music_note</span>
                    <img id="cover-art-img" src="" alt="Album Art" style="width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s ease; position: absolute; top: 0; left: 0;">
                </div>
                
                <!-- Parça Bilgisi -->
                <div class="track-info" style="text-align: center; width: 100%;">
                    <h3 id="current-track-name" style="font-size: 22px; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 8px;">Parça Seçilmedi</h3>
                    <p style="color: var(--text-secondary); font-size: 15px;">DJ Kalaycı</p>
                </div>

                <!-- Custom Progress Bar -->
                <div class="progress-container" style="width: 100%;">
                    <div style="display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; font-weight: 500;">
                        <span id="time-current">00:00</span>
                        <span id="time-total">00:00</span>
                    </div>
                    <div id="progress-bar-bg" style="width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; position: relative;">
                        <div id="progress-bar-fill" style="width: 0%; height: 100%; background: var(--accent-color); border-radius: 4px; pointer-events: none; transition: width 0.1s linear;"></div>
                        <div id="progress-bar-handle" class="progress-handle"></div>
                    </div>
                </div>

                <!-- Custom Controls -->
                <div class="controls-row" style="display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: 8px;">
                    <button id="btn-shuffle" class="control-btn" title="Karışık Çal"><span class="material-symbols-rounded">shuffle</span></button>
                    <button id="btn-prev" class="control-btn"><span class="material-symbols-rounded" style="font-size: 36px;">skip_previous</span></button>
                    
                    <button id="btn-play-pause" class="play-btn" style="background: var(--accent-color); color: white; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4); border: none; cursor: pointer; transition: transform 0.2s;">
                        <span class="material-symbols-rounded" id="play-pause-icon" style="font-size: 36px;">play_arrow</span>
                    </button>
                    
                    <button id="btn-next" class="control-btn"><span class="material-symbols-rounded" style="font-size: 36px;">skip_next</span></button>
                    <button id="btn-loop" class="control-btn" title="Döngü"><span class="material-symbols-rounded">repeat</span></button>
                </div>
                
                <!-- VOLUME CONTROL -->
                <div class="volume-container" style="display: flex; align-items: center; gap: 12px; width: 100%; margin-top: 8px;">
                    <button id="btn-mute" class="control-btn" style="color: var(--text-secondary); padding: 0;"><span class="material-symbols-rounded" id="mute-icon">volume_up</span></button>
                    <div id="volume-bar-bg" class="progress-container" style="flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; position: relative;">
                        <div id="volume-bar-fill" style="width: 100%; height: 100%; background: var(--accent-color); border-radius: 4px; pointer-events: none; transition: width 0.1s linear;"></div>
                        <div id="volume-bar-handle" class="progress-handle" style="left: 100%;"></div>
                    </div>
                </div>
                
                <!-- Gizli Orijinal Audio -->
                <audio id="audio-player" style="display: none;"></audio>
            </div>

            <!-- Sağ Taraf: Müzik Listesi (Playlist) -->
            <div class="playlist-section" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div>
                        <h1 style="font-size: 32px; margin-bottom: 4px;">Çalma Listesi</h1>
                        <p style="color: var(--text-secondary);">Yüklediğiniz tüm parçalar.</p>
                    </div>
                    <!-- Sayfalama Limit Seçici -->
                    <div class="glass-effect" style="padding: 8px 16px; border-radius: 8px; display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 14px; font-weight: 500;">Limit:</span>
                        <select id="player-limit-select" class="limit-select" style="background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--glass-border); padding: 4px 8px; border-radius: 4px; outline: none; font-family: inherit;">
                            <option value="10">10</option>
                            <option value="25" selected>25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                </div>

                <!-- Müzik Listesi -->
                <div id="music-list" class="music-list glass-effect" style="flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding: 16px;">
                    <div style="text-align: center; color: var(--text-secondary); padding: 24px;">Yükleniyor...</div>
                </div>

                <!-- Sayfalama Butonları -->
                <div id="pagination-controls" style="display: flex; justify-content: center; gap: 12px; margin-top: 24px; padding-bottom: 24px;">
                    <button id="btn-prev-page" class="btn-secondary" disabled>Önceki</button>
                    <span id="page-indicator" style="align-self: center; font-weight: bold; background: var(--glass-bg); padding: 8px 16px; border-radius: 8px;">Sayfa: 1</span>
                    <button id="btn-next-page" class="btn-secondary" disabled>Sonraki</button>
                </div>
            </div>
            
        </div>
    </template>

    <template id="screen-analytics">
        <div class="screen fade-in">
            <div class="header">
                <h1>İstatistikler</h1>
                <p>Kullanım verileri ve analizler.</p>
            </div>
            <div class="card glass-effect" style="height: 300px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);">
                <p>Grafik arayüzü buraya eklenecektir...</p>
            </div>
        </div>
    </template>

    <template id="screen-settings">
        <!-- Settings template (Önceki hali ile aynı) -->
        <div class="screen fade-in">
            <div class="header">
                <h1>Ayarlar</h1>
                <p>Sistem ve arayüz yapılandırma seçenekleri.</p>
            </div>
            <div class="settings-list">
                <div class="setting-item glass-effect" style="flex-direction: column; align-items: flex-start; gap: 16px;">
                    <div class="setting-info">
                        <h3>Yükleme Konumu (Upload Path)</h3>
                        <p>Dosyaların sunucu üzerinde kaydedileceği dizini seçin.</p>
                    </div>
                    <div class="file-browser" style="width: 100%; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border);">
                        <div class="path-navigation" style="display: flex; gap: 8px; margin-bottom: 12px;">
                            <button id="btn-up-dir" class="btn-secondary" style="margin-top: 0; padding: 8px 12px; display: flex; align-items: center; gap: 4px;">
                                <span class="material-symbols-rounded" style="font-size: 18px;">arrow_upward</span> Üst Klasör
                            </button>
                            <div style="flex: 1; position: relative; display: flex; align-items: center;">
                                <input type="text" id="current-path-input" style="width: 100%; padding: 8px 36px 8px 12px; border-radius: 4px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: white; font-size: 14px; transition: all 0.3s;" readonly>
                                <span id="path-success-icon" class="material-symbols-rounded" style="position: absolute; right: 8px; color: var(--success); opacity: 0; transition: opacity 0.3s; font-size: 20px;">check_circle</span>
                            </div>
                        </div>
                        <div id="dir-list" style="max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-right: 8px;">
                            <!-- Klasörler -->
                        </div>
                    </div>
                    <button id="save-location-btn" class="btn-primary" style="margin-top: 0;">Bu Konumu Kaydet</button>
                </div>
            </div>
        </div>
    </template>

    <script src="js/ScreenManager.js?v=1.1"></script>
    <script src="js/main.js?v=1.1"></script>

    <!-- Cihaz Seçim Modalı -->
    <div id="device-modal" class="modal-backdrop" style="display: none;">
        <div class="modal-content glass-effect fade-in">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 32px;">
                <div style="width: 40px; height: 40px; background: var(--accent-color); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <span class="material-symbols-rounded" style="color: white;">headphones</span>
                </div>
                <h2 style="margin: 0; font-size: 20px;">DJ_Kalayci <span style="font-size: 12px; color: var(--text-secondary);">v1.2</span></h2>
            </div>
            <button id="btn-close-modal" class="control-btn" style="position: absolute; top: 24px; right: 24px;"><span class="material-symbols-rounded">close</span></button>
            
            <div id="device-list" style="display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 8px;">
                <!-- Cihazlar dinamik gelecek -->
            </div>
        </div>
    </div>
</body>
</html>
