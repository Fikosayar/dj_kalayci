version: '3.8'

services:
  dj_kalayci_app:
    build: .
    # Konteyner yeniden başlatıldığında otomatik kalksın
    restart: unless-stopped
    ports:
      - "8106:8106"
    # İŞTE KRİTİK NOKTA: Debian sunucunun ses kartını içeri aktarıyoruz
    devices:
      - "/dev/snd:/dev/snd"
    # Ses grubuna (audio) dahil ediyoruz ki yetki sorunu yaşanmasın
    group_add:
      - audio
    volumes:
      # Uploads klasörünü kalıcı yapıyoruz
      - dj_kalayci_uploads:/app/uploads

volumes:
  dj_kalayci_uploads:
