version: '3.8'

services:
  dj_kalayci_app:
    build: .
    # Konteyner yeniden başlatıldığında otomatik kalksın
    restart: unless-stopped
    ports:
      - "8106:8106"
    # İŞTE KRİTİK NOKTA: Debian sunucunun ses kartını içeri aktarıyoruz
    devices:
      - "/dev/snd:/dev/snd"
    # Ses grubuna (audio) dahil ediyoruz
    group_add:
      - audio
    # Tüm donanım engellerini aşmak için tam yetki (nuclear option)
    privileged: true
    # ALSA dmix (ses karıştırıcı) eklentisinin çalışabilmesi için host'un bellek alanını (IPC) kullan
    ipc: host
    environment:
      - ALSA_CARD=0
    volumes:
      # Uploads klasörünü kalıcı yapıyoruz
      - dj_kalayci_uploads:/app/uploads
      # Kalıcı veri klasörü (config.json + stations.json burada)
      - dj_kalayci_data:/app/data
    labels:
      # Traefik: Büyük dosya yüklemelerine (MP3 set vb.) izin ver
      # Middleware tanımı
      - "traefik.http.middlewares.dj-upload-buffer.buffering.maxRequestBodyBytes=524288000"
      - "traefik.http.middlewares.dj-upload-buffer.buffering.maxResponseBodyBytes=524288000"
      - "traefik.http.middlewares.dj-upload-buffer.buffering.memRequestBodyBytes=10485760"
      # Coolify farklı router adları kullanabilir — birkaç varyasyon dene
      - "traefik.http.routers.dj_kalayci_app.middlewares=dj-upload-buffer"
      - "traefik.http.routers.dj_kalayci_app-http.middlewares=dj-upload-buffer"
      - "traefik.http.routers.dj_kalayci_app-https.middlewares=dj-upload-buffer"

volumes:
  dj_kalayci_uploads:
  dj_kalayci_data:
