version: '3.8'

services:
  dj_kalayci_app:
    build: .
    # Konteyner yeniden başlatıldığında otomatik kalksın
    restart: unless-stopped
    ports:
      - "8106:8106"
    # İŞTE KRİTİK NOKTA: Debian sunucunun ses kartını içeri aktarıyoruz
    devices:
      - "/dev/snd:/dev/snd"
    # Ses grubuna (audio) dahil ediyoruz ki yetki sorunu yaşanmasın
    group_add:
      - audio
    environment:
      # Sesi doğrudan PulseAudio soketine yönlendiriyoruz
      - PULSE_SERVER=unix:/run/pulse/native
    volumes:
      # Uploads klasörünü kalıcı yapıyoruz
      - dj_kalayci_uploads:/app/uploads
      # Debian host'taki Pulse socketini Docker'a bağlıyoruz (Genellikle 1000 id'li kullanıcıda olur)
      - /run/user/1000/pulse/native:/run/pulse/native

volumes:
  dj_kalayci_uploads:
